<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Brevix</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="hdr">
      <span class="brand">BREVIX</span>
      <span class="ver">v0.1.0</span>
    </header>

    <section class="row">
      <label class="lbl">Mode</label>
      <select id="mode" class="select">
        <option value="off">Off</option>
        <option value="lite">Lite — gentle</option>
        <option value="full">Full — default</option>
        <option value="ultra">Ultra — max</option>
      </select>
    </section>

    <section class="row toggle">
      <label class="lbl" for="enabled">Enabled</label>
      <input type="checkbox" id="enabled" />
    </section>

    <section class="stats">
      <div class="stat">
        <span class="stat-label">Tokens saved</span>
        <span class="stat-value" id="tokens-saved">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Chars saved</span>
        <span class="stat-value" id="chars-saved">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Compressions</span>
        <span class="stat-value" id="compressions">0</span>
      </div>
    </section>

    <section class="row actions">
      <button id="open-options" class="btn">Settings</button>
      <button id="reset-stats" class="btn danger">Reset stats</button>
    </section>

    <footer class="ftr">
      <a href="https://github.com/Yash-Koladiya30/brevix" target="_blank" rel="noopener">GitHub</a>
      <span>·</span>
      <span>MIT</span>
    </footer>

    <script src="../lib/rules.js"></script>
    <script src="../lib/stats.js"></script>
    <script src="popup.js"></script>
  </body>
</html>

description = "Run Accuracy Guard — check semantic similarity between original and compressed text."

prompt = """Verify a compression preserves meaning.

Parse `{{args}}` as `<original> | <compressed>` (split on first ` | `).

Run:
```bash
brevix check "<original>" "<compressed>"
```

Report similarity score, threshold, and pass/fail. If sentence-transformers is not installed, the check uses content-word containment fallback (drops stopwords without penalty — fair to compression).
"""

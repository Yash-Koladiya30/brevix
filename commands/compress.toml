description = "Compress a memory/context file in place with .original backup. Same as /brevix-compress-file. Invoke as /brevix:compress <path>."

prompt = """Run Brevix file compression on the target file `{{args}}`.

Brevix:
1. Reads the file.
2. Applies compression rules (default: full mode).
3. Saves an untouched copy as `<file>.original.<ext>`.
4. Writes the compressed text back to the original path.
5. Runs Accuracy Guard. If similarity < 0.85, the operation is skipped unless `--force` flag passed.

Run:
```bash
brevix compress-file {{args}}
```

Report savings (chars saved, %, tokens) and backup path.

If `brevix` CLI not installed, instruct: `pip install brevix`.

Designed for files loaded into the model's input every session
(CLAUDE.md, AGENTS.md, project notes, persona prompts) where
compression saves input tokens for the entire project lifetime.
"""

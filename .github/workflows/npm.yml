name: Publish brevix-shrink to npm

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/brevix-shrink
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Set package version from git tag
        working-directory: mcp-servers/brevix-shrink
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "Setting brevix-shrink version to ${TAG}"
          npm pkg set version="${TAG}"
          cat package.json | grep '"version"'

      - name: Publish to npm
        working-directory: mcp-servers/brevix-shrink
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
